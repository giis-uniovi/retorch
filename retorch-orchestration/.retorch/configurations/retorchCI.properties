# Configuration properties for the Continuous Integration (CI) environment and System Under Test (SUT). Specifies the
# Jenkins CI Agent, the base path of the test cases and some configurations of the SUT like the port or the frontend
# url.
agentCIName=any
testsBasePath=somepath/somedir/
sut-location=$WORKSPACE
app-url="http://full-teaching-$TJOB_NAME:5000"
sut-wait-html=<div class=\\"esh-catalog-item col-md-4\\">
sut-container-name=full-teaching
